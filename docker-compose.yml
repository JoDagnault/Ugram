version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ugram-backend
    ports:
      - "3000:3000"
    networks:
      - ugram-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ugram-frontend
    ports:
      - "5173:80"
    networks:
      - ugram-net
    depends_on:
      - backend

networks:
  ugram-net:
    driver: bridge
