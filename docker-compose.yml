services:
  postgres:
    image: postgres:16-alpine
    container_name: ugram-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ugram-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ugram-migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - ugram-net
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "pnpm prisma:migrate:deploy"
    restart: "no"

  seed:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ugram-seed
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - ugram-net
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: sh -c "pnpm prisma db seed"
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ugram-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    networks:
      - ugram-net
    depends_on:
      seed:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ugram-frontend
    ports:
      - "5173:80"
    networks:
      - ugram-net
    depends_on:
      - backend

networks:
  ugram-net:
    driver: bridge

volumes:
  postgres_data:
