services:
  postgres:
    image: postgres:16-alpine
    container_name: ugram-postgres
    env_file:
      - ./backend/.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ugram-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ugram-migrate
    env_file:
      - ./backend/.env
    networks:
      - ugram-net
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "pnpm --dir backend run prisma:migrate:deploy"
    restart: "no"

  seed:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ugram-seed
    env_file:
      - ./backend/.env
    networks:
      - ugram-net
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: sh -c "pnpm --dir backend run prisma:seed:deploy"
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ugram-backend
    env_file:
      - ./backend/.env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    networks:
      - ugram-net
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
    command: node backend/dist/src/index.js

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ugram-frontend
    ports:
      - "5173:80"
    networks:
      - ugram-net
    depends_on:
      - backend

networks:
  ugram-net:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
